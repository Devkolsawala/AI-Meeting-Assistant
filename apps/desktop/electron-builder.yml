appId: com.meetcopilot.desktop
productName: MeetCopilot
directories:
  output: release
# The renderer loads an AudioWorklet by URL; serving app files from disk (no asar)
# avoids archive edge cases for that and keeps packaging simple.
asar: false
files:
  - dist/**
  - package.json
# Registers the meetcopilot:// scheme with the OS at install time so the browser
# can hand the PKCE auth code back to the app via the deep link.
protocols:
  - name: MeetCopilot
    schemes:
      - meetcopilot
win:
  target: nsis
  # Code signing is delegated to a custom hook that picks the backend (local cert,
  # Azure Trusted Signing, or SSL.com eSigner) from the SIGN_PROVIDER env var and
  # reads all credentials from the environment. With SIGN_PROVIDER unset the hook is
  # a no-op and the build is left unsigned (dev). See docs/desktop-signing.md.
  signtoolOptions:
    sign: scripts/sign.mjs
nsis:
  oneClick: true
  perMachine: false
